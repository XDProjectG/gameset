<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>遊戲庫：三國志經略</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="game-select-screen" class="screen active">
        <div class="panel opening">
          <h1>三國志：州郡經略</h1>
          <p>
            東漢末年，群雄並起。你將以一州長官之身，經略城池、整頓內政、養兵治民，
            在正史《三國志》所記載的天下格局中，走出屬於你的道路。
          </p>
          <button id="launch-game" class="primary">點擊進入遊戲</button>
        </div>
      </section>

      <section id="map-screen" class="screen">
        <canvas id="world-canvas" aria-label="三國時代大地圖與遊戲介面"></canvas>
      </section>
    </main>

    <script src="./games/game1/model.js"></script>
    <script src="./games/game1/renderer.js"></script>
    <script src="./games/game1/controller.js"></script>
    <script src="./games/game1/game.js"></script>
  </body>
</html>
