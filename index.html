<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>遊戲庫：三國志經略</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="game-select-screen" class="screen active">
        <div class="panel opening">
          <h1>遊戲庫入口</h1>
          <p>
            這裡同時提供正式遊戲與遊戲機制展示間。你可以進入《三國志：州郡經略》，
            也可以先到展示間中體驗與測試獨立機制組件。
          </p>
          <div class="menu">
            <button id="launch-game" class="primary">進入三國志：州郡經略</button>
          </div>
        </div>

        <div class="panel opening">
          <h1>遊戲機制展示間</h1>
          <p>
            這裡展示可重複利用的遊戲組件。初始展示間會自動生成所有展示房入口，
            你可以先體驗鏡頭、移動與格子系統，再回頭整合進正式遊戲。
          </p>
          <div class="menu">
            <button id="launch-demo">進入遊戲機制展示間</button>
          </div>
        </div>
      </section>

      <section id="map-screen" class="screen">
        <canvas id="world-canvas" aria-label="三國時代大地圖與遊戲介面"></canvas>
      </section>
    </main>

    <script src="./system/demo.js"></script>
    <script src="./games/game1/model.js"></script>
    <script src="./games/game1/renderer.js"></script>
    <script src="./games/game1/controller.js"></script>
    <script src="./games/game1/game.js"></script>
  </body>
</html>
