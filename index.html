<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>遊戲庫：三國志經略</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="opening-screen" class="screen active">
        <div class="panel opening">
          <h1>三國志：州郡經略</h1>
          <p>
            東漢末年，群雄並起。你將以一州長官之身，經略城池、整頓內政、養兵治民，
            在正史《三國志》所記載的天下格局中，走出屬於你的道路。
          </p>
          <button id="opening-continue" class="primary">點擊進入遊戲</button>
        </div>
      </section>

      <section id="title-screen" class="screen">
        <div class="panel title">
          <h1>三國志：州郡經略</h1>
          <p class="subtitle">以正史《三國志》為背景的 2D Canvas 策略原型</p>
          <nav class="menu">
            <button data-action="new">1. 新遊戲</button>
            <button data-action="load">2. 載入遊戲</button>
            <button data-action="settings">3. 設定</button>
          </nav>
          <p id="menu-message" class="menu-message"></p>
        </div>
      </section>

      <section id="map-screen" class="screen">
        <canvas id="world-canvas" aria-label="三國時代大地圖與遊戲介面"></canvas>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
